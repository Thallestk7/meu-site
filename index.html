<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>PDF Web Reader</title>

  <style>
    :root {
      --bg: #eef1f5;
      --panel: #ffffff;
      --line: #d8dee7;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: rgba(37, 99, 235, 0.16);
      --search: rgba(250, 204, 21, 0.28);
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sep {
      width: 1px;
      height: 28px;
      background: var(--line);
    }

    .btn,
    .input,
    .page-input {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .btn {
      min-width: 38px;
      padding: 0 12px;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .input,
    .page-input {
      padding: 0 12px;
    }

    .input {
      min-width: 220px;
    }

    .page-input {
      width: 60px;
      text-align: center;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .viewer-shell {
      flex: 1;
      min-height: 0;
      padding: 16px;
    }

    .viewer-wrap {
      width: 100%;
      height: 100%;
      background: #dfe5eb;
      border-radius: 14px;
      overflow: auto;
      position: relative;
    }

    .viewer-center {
      min-width: 100%;
      min-height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 18px;
    }

    .page-stage {
      position: relative;
      width: fit-content;
      height: fit-content;
    }

    #pdfCanvas {
      display: block;
      background: #fff;
      box-shadow: var(--shadow);
    }

    #highlightLayer {
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: none;
    }

    .highlight-box {
      position: absolute;
      background: var(--search);
      border-radius: 2px;
    }

    .highlight-box.active {
      background: var(--primary-soft);
      outline: 1px solid rgba(37, 99, 235, 0.4);
    }

    .overlay {
      position: absolute;
      inset: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 5;
    }

    .card {
      max-width: 560px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 22px 20px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      word-break: break-word;
    }

    .hidden {
      display: none !important;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #dbe4f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-group">
      <button class="btn" id="prevBtn">◀</button>
      <span class="status" id="pageInfo">1 / 1</span>
      <button class="btn" id="nextBtn">▶</button>
    </div>

    <div class="sep"></div>

    <div class="toolbar-group">
      <button class="btn" id="zoomOutBtn">-</button>
      <span class="status" id="zoomInfo">100%</span>
      <button class="btn" id="zoomInBtn">+</button>
      <button class="btn" id="fitWidthBtn">Largura</button>
      <button class="btn" id="resetZoomBtn">100%</button>
    </div>

    <div class="sep"></div>

    <div class="toolbar-group">
      <input class="input" id="searchInput" type="text" placeholder="Buscar no PDF" />
      <button class="btn" id="searchPrevBtn">↑</button>
      <button class="btn" id="searchNextBtn">↓</button>
      <span class="status" id="searchInfo">0/0</span>
    </div>

    <div class="sep"></div>

    <div class="toolbar-group">
      <input class="page-input" id="pageInput" type="number" min="1" value="1" />
      <button class="btn" id="goPageBtn">Ir</button>
      <button class="btn" id="openBtn">Abrir PDF</button>
    </div>
  </div>

  <div class="viewer-shell">
    <div class="viewer-wrap" id="viewerWrap">
      <div class="viewer-center">
        <div class="page-stage" id="pageStage">
          <canvas id="pdfCanvas"></canvas>
          <div id="highlightLayer"></div>
        </div>
      </div>

      <div class="overlay" id="loadingState">
        <div class="card">
          <div class="spinner"></div>
          <div class="title">Carregando PDF</div>
          <div class="text" id="loadingText">Aguarde enquanto o documento está sendo preparado.</div>
        </div>
      </div>

      <div class="overlay hidden" id="errorState">
        <div class="card">
          <div class="title">Não foi possível abrir o PDF</div>
          <div class="text" id="errorText"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js";

    const state = {
      pdfDoc: null,
      currentPage: 1,
      totalPages: 0,
      scale: 1,
      fileUrl: '',
      currentViewport: null,
      lastTextItems: [],
      matches: [],
      activeMatchIndex: -1,
      searchQuery: ''
    };

    const el = {
      canvas: document.getElementById('pdfCanvas'),
      ctx: document.getElementById('pdfCanvas').getContext('2d'),
      viewerWrap: document.getElementById('viewerWrap'),
      pageStage: document.getElementById('pageStage'),
      highlightLayer: document.getElementById('highlightLayer'),
      pageInfo: document.getElementById('pageInfo'),
      zoomInfo: document.getElementById('zoomInfo'),
      searchInfo: document.getElementById('searchInfo'),
      searchInput: document.getElementById('searchInput'),
      pageInput: document.getElementById('pageInput'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      zoomOutBtn: document.getElementById('zoomOutBtn'),
      zoomInBtn: document.getElementById('zoomInBtn'),
      fitWidthBtn: document.getElementById('fitWidthBtn'),
      resetZoomBtn: document.getElementById('resetZoomBtn'),
      searchPrevBtn: document.getElementById('searchPrevBtn'),
      searchNextBtn: document.getElementById('searchNextBtn'),
      goPageBtn: document.getElementById('goPageBtn'),
      openBtn: document.getElementById('openBtn'),
      loadingState: document.getElementById('loadingState'),
      loadingText: document.getElementById('loadingText'),
      errorState: document.getElementById('errorState'),
      errorText: document.getElementById('errorText')
    };

    function setLoading(show, text = '') {
      el.loadingText.textContent = text;
      el.loadingState.classList.toggle('hidden', !show);
    }

    function setError(show, text = '') {
      el.errorText.textContent = text;
      el.errorState.classList.toggle('hidden', !show);
    }

    function updateToolbar() {
      el.pageInfo.textContent = `${state.currentPage} / ${state.totalPages || 1}`;
      el.zoomInfo.textContent = `${Math.round(state.scale * 100)}%`;
      el.pageInput.value = state.currentPage;
      el.prevBtn.disabled = state.currentPage <= 1;
      el.nextBtn.disabled = state.currentPage >= state.totalPages;
      el.searchPrevBtn.disabled = state.matches.length === 0;
      el.searchNextBtn.disabled = state.matches.length === 0;
      el.searchInfo.textContent = state.matches.length
        ? `${state.activeMatchIndex + 1}/${state.matches.length}`
        : '0/0';
    }

    function clearHighlights() {
      state.matches = [];
      state.activeMatchIndex = -1;
      el.highlightLayer.innerHTML = '';
      updateToolbar();
    }

    function applyCanvasSize(viewport) {
      el.canvas.width = Math.floor(viewport.width);
      el.canvas.height = Math.floor(viewport.height);
      el.canvas.style.width = `${viewport.width}px`;
      el.canvas.style.height = `${viewport.height}px`;

      el.pageStage.style.width = `${viewport.width}px`;
      el.pageStage.style.height = `${viewport.height}px`;
      el.highlightLayer.style.width = `${viewport.width}px`;
      el.highlightLayer.style.height = `${viewport.height}px`;
    }

    async function loadPdf() {
      try {
        const params = new URLSearchParams(window.location.search);
        const rawFile = params.get('file');

        if (!rawFile) {
          throw new Error('Parâmetro "file" não informado.');
        }

        state.fileUrl = decodeURIComponent(rawFile);

        setLoading(true, 'Baixando e renderizando o documento...');
        setError(false);

        const response = await fetch(state.fileUrl, {
          method: 'GET',
          mode: 'cors'
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status} ao baixar PDF.`);
        }

        const buffer = await response.arrayBuffer();

        if (!buffer || buffer.byteLength === 0) {
          throw new Error('O arquivo retornou vazio.');
        }

        const uint8 = new Uint8Array(buffer);
        const loadingTask = pdfjsLib.getDocument({ data: uint8 });
        state.pdfDoc = await loadingTask.promise;
        state.totalPages = state.pdfDoc.numPages;
        state.currentPage = 1;

        await renderPage(1);
        setLoading(false);
      } catch (error) {
        console.error(error);
        setLoading(false);
        setError(
          true,
          `Erro ao carregar o PDF. Verifique se o link do Supabase está válido, ainda não expirou e permite acesso via navegador. Detalhe: ${error.message || error}`
        );
      }
    }

    async function renderPage(pageNumber) {
      if (!state.pdfDoc) return;

      const page = await state.pdfDoc.getPage(pageNumber);
      const viewport = page.getViewport({ scale: state.scale });
      state.currentViewport = viewport;

      applyCanvasSize(viewport);
      clearHighlights();

      await page.render({
        canvasContext: el.ctx,
        viewport
      }).promise;

      state.currentPage = pageNumber;
      state.lastTextItems = (await page.getTextContent()).items || [];

      if (state.searchQuery.trim()) {
        renderSearchHighlights();
      }

      updateToolbar();
    }

    function renderSearchHighlights() {
      clearHighlights();

      const q = state.searchQuery.trim().toLowerCase();
      if (!q || !state.currentViewport || !state.lastTextItems.length) return;

      state.lastTextItems.forEach((item) => {
        const text = String(item.str || '');
        if (!text.toLowerCase().includes(q)) return;

        const tx = pdfjsLib.Util.transform(
          state.currentViewport.transform,
          item.transform
        );

        const width = item.width * state.scale;
        const height = Math.abs(item.height * state.scale) || 16;
        const left = tx[4];
        const top = tx[5] - height;

        state.matches.push({ left, top, width, height });
      });

      state.matches.forEach((m, index) => {
        const box = document.createElement('div');
        box.className = `highlight-box ${index === 0 ? 'active' : ''}`;
        box.style.left = `${m.left}px`;
        box.style.top = `${m.top}px`;
        box.style.width = `${m.width}px`;
        box.style.height = `${m.height}px`;
        el.highlightLayer.appendChild(box);
      });

      if (state.matches.length > 0) {
        state.activeMatchIndex = 0;
        scrollToActiveMatch();
      }

      updateToolbar();
    }

    function scrollToActiveMatch() {
      const all = el.highlightLayer.querySelectorAll('.highlight-box');
      all.forEach((node, index) => {
        node.classList.toggle('active', index === state.activeMatchIndex);
      });

      if (state.activeMatchIndex < 0 || state.activeMatchIndex >= state.matches.length) return;

      const match = state.matches[state.activeMatchIndex];
      el.viewerWrap.scrollTo({
        left: Math.max(match.left - 40, 0),
        top: Math.max(match.top - 40, 0),
        behavior: 'smooth'
      });

      updateToolbar();
    }

    function setZoom(nextZoom) {
      state.scale = Math.max(0.5, Math.min(3, nextZoom));
      renderPage(state.currentPage);
    }

    function fitToWidth() {
      if (!state.pdfDoc) return;

      state.pdfDoc.getPage(state.currentPage).then((page) => {
        const viewport = page.getViewport({ scale: 1 });
        const availableWidth = el.viewerWrap.clientWidth - 40;
        const nextScale = availableWidth / viewport.width;
        state.scale = Math.max(0.5, Math.min(3, nextScale));
        renderPage(state.currentPage);
      });
    }

    function goToPage(value) {
      const page = Number(value);
      if (!Number.isFinite(page)) return;
      if (page < 1 || page > state.totalPages) return;
      renderPage(page);
    }

    el.prevBtn.addEventListener('click', () => {
      if (state.currentPage > 1) renderPage(state.currentPage - 1);
    });

    el.nextBtn.addEventListener('click', () => {
      if (state.currentPage < state.totalPages) renderPage(state.currentPage + 1);
    });

    el.zoomOutBtn.addEventListener('click', () => setZoom(state.scale - 0.1));
    el.zoomInBtn.addEventListener('click', () => setZoom(state.scale + 0.1));
    el.resetZoomBtn.addEventListener('click', () => setZoom(1));
    el.fitWidthBtn.addEventListener('click', fitToWidth);

    el.searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value || '';
      renderSearchHighlights();
    });

    el.searchNextBtn.addEventListener('click', () => {
      if (!state.matches.length) return;
      state.activeMatchIndex = (state.activeMatchIndex + 1) % state.matches.length;
      scrollToActiveMatch();
    });

    el.searchPrevBtn.addEventListener('click', () => {
      if (!state.matches.length) return;
      state.activeMatchIndex =
        (state.activeMatchIndex - 1 + state.matches.length) % state.matches.length;
      scrollToActiveMatch();
    });

    el.goPageBtn.addEventListener('click', () => goToPage(el.pageInput.value));
    el.pageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') goToPage(el.pageInput.value);
    });

    el.openBtn.addEventListener('click', () => {
      if (state.fileUrl) {
        window.open(state.fileUrl, '_blank', 'noopener,noreferrer');
      }
    });

    updateToolbar();
    loadPdf();
  </script>
</body>
</html>
